<p style="font-size:.75rem;color:#334155;margin:-14px 0 18px;line-height:1.7;word-break:break-word">Taste: Mondrian • Iterations: 30 • Model: ChatGPT 5.4 Mini • Magnitude: 5/10 (Moderate) • Selection mode: Probabilistic • Critic sees: Images only • Variants per iteration: 2 • Starting program: FD 100</p>
<div style="display:flex;align-items:center;gap:12px;margin:24px 0 8px"><h2 style="font-size:1.1rem;font-weight:700;color:#0f172a">Evolution Tree</h2><button onclick="fitTree()" id="btnFit" style="font-size:.72rem;padding:3px 10px;border:1px solid #cbd5e1;border-radius:4px;cursor:pointer;background:#f8fafc">Fit to screen</button><button onclick="actualSize()" style="font-size:.72rem;padding:3px 10px;border:1px solid #cbd5e1;border-radius:4px;cursor:pointer;background:#f8fafc">Actual size</button></div>

<script>
const activeAnims={};
function compileLogo(code, W, H) {
  const queue = [];
  const procs = {};
  let callDepth = 0;
  const MAX_DEPTH = 200, MAX_OPS = 120000;
  let opCount = 0;

  let sx = W/2, sy = H/2, heading = 0;
  let penDown = true, penColor = '#1e293b', penSize = 1.5;
  const unknownCmds = new Set();

  const toRad = h => (h - 90) * Math.PI / 180;

  const NAMED_COLORS = {
    BLACK:'#000',BLUE:'#0055ff',GREEN:'#00cc44',CYAN:'#00ffff',
    RED:'#ff3333',MAGENTA:'#ff00ff',YELLOW:'#ffff00',WHITE:'#fff',
    ORANGE:'#ff8800',PURPLE:'#8833cc',BROWN:'#aa6600',PINK:'#ffaacc',
    GRAY:'#888',GREY:'#888',LIME:'#aaff00',TEAL:'#00aaaa',NAVY:'#000088',
    GOLD:'#ffcc00',VIOLET:'#8800ff',INDIGO:'#4400aa',CRIMSON:'#cc1133',
    CORAL:'#ff6644',SKYBLUE:'#66aaff',MINT:'#44ffbb',ROSE:'#ff4477',
    AMBER:'#ffaa00',SILVER:'#c0c0c0',MAROON:'#800000',OLIVE:'#808000',
  };
  const LOGO_PALETTE = [
    '#000','#0000ff','#00ff00','#00ffff','#ff0000','#ff00ff','#ffff00','#fff',
    '#a52a2a','#d2b48c','#008000','#40e0d0','#ffa500','#800080','#ffd700','#c0c0c0',
  ];

  function resolveColor(v) {
    if (Array.isArray(v)) {
      const r=Math.round(Number(v[0])||0),g=Math.round(Number(v[1])||0),b=Math.round(Number(v[2])||0);
      return 'rgb('+r+','+g+','+b+')';
    }
    if (typeof v === 'number') return LOGO_PALETTE[Math.abs(Math.floor(v)) % LOGO_PALETTE.length];
    const s = String(v).trim().toUpperCase();
    if (NAMED_COLORS[s]) return NAMED_COLORS[s];
    return v;
  }

  function drawTo(nx, ny) {
    if (penDown) queue.push({type:'line',x1:sx,y1:sy,x2:nx,y2:ny,c:penColor,w:penSize});
    sx = nx; sy = ny;
  }

  function arcLines(cx, cy, r, startA, endA, ccw) {
    if (r <= 0) return;
    const span = ccw
      ? ((startA - endA + 2*Math.PI) % (2*Math.PI)) || 2*Math.PI
      : ((endA - startA + 2*Math.PI) % (2*Math.PI)) || 2*Math.PI;
    const n = Math.max(6, Math.round(32 * span / (2*Math.PI)));
    const step = (ccw ? -1 : 1) * span / n;
    let px = cx + r*Math.cos(startA), py = cy + r*Math.sin(startA);
    for (let i = 1; i <= n; i++) {
      const a = startA + step * i;
      const nx2 = cx + r*Math.cos(a), ny2 = cy + r*Math.sin(a);
      if (penDown) queue.push({type:'line',x1:px,y1:py,x2:nx2,y2:ny2,c:penColor,w:penSize});
      px = nx2; py = ny2;
    }
    sx = px; sy = py;
  }

  // ── Tokenizer ──
  function tokenize(src) {
    src = src.replace(/;[^\n]*/g,' ');
    const T = []; let i = 0;
    while (i < src.length) {
      const c = src[i];
      if (/\s/.test(c)) { i++; continue; }
      if (c==='[') { T.push(['[']); i++; }
      else if (c===']') { T.push([']']); i++; }
      else if (c==='(') { T.push(['(']); i++; }
      else if (c===')') { T.push([')']); i++; }
      else if (c==='+') { T.push(['+']); i++; }
      else if (c==='*') { T.push(['*']); i++; }
      else if (c==='/') { T.push(['/']); i++; }
      else if (c==='<') { T.push([src[i+1]==='='?(i++,'<='):'<']); i++; }
      else if (c==='>') { T.push([src[i+1]==='='?(i++,'>='):'>']); i++; }
      else if (c==='=') { T.push(['=']); i++; }
      else if (c==='-') {
        const prev = T[T.length-1];
        const isOp = !prev || ['[','(','+','-','*','/','<','>','<=','>=','='].includes(prev[0]);
        // Also treat as negative number when preceded by whitespace:
        // 'SETXY 0 -140' → [-140] is a new arg, not '0 - 140'
        const prevWasSpace = i>0 && /\s/.test(src[i-1]);
        if ((isOp || prevWasSpace) && i+1<src.length && /[\d.]/.test(src[i+1])) {
          let n='-'; i++;
          while (i<src.length && /[\d.]/.test(src[i])) n+=src[i++];
          T.push(['NUM',parseFloat(n)]);
        } else { T.push(['-']); i++; }
      }
      else if (/[\d.]/.test(c)) {
        let n=''; while (i<src.length && /[\d.]/.test(src[i])) n+=src[i++];
        T.push(['NUM',parseFloat(n)]);
      }
      else if (c==='"') {
        i++; let w='';
        while (i<src.length && !/[\s\[\]()]/.test(src[i])) w+=src[i++];
        T.push(['WORD',w]);
      }
      else if (c===':') {
        i++; let n='';
        while (i<src.length && /[\w]/.test(src[i])) n+=src[i++];
        T.push(['VAR',n.toUpperCase()]);
      }
      else if (/[a-zA-Z_]/.test(c)) {
        let w=''; while (i<src.length && /[\w?!]/.test(src[i])) w+=src[i++];
        T.push(['CMD',w.toUpperCase()]);
      }
      else i++;
    }
    return T;
  }

  function collectList(T,p) {
    let depth=1; p++;
    const list=[];
    while (p<T.length&&depth>0) {
      if (T[p][0]==='[') depth++;
      else if (T[p][0]===']') { if(--depth===0){p++;break;} }
      list.push(T[p]); p++;
    }
    return [list,p];
  }

  function getValue(T,p,V) {
    if (p>=T.length) return [0,p];
    const t=T[p]; const k=t[0];
    if (k==='NUM') return [t[1],p+1];
    if (k==='WORD') return [t[1],p+1];
    if (k==='VAR') return [V[t[1]]!==undefined?V[t[1]]:0,p+1];
    if (k==='[') { const [list,np]=collectList(T,p); return [list,np]; }
    if (k==='(') {
      // (LIST expr ...) builds a JS array (e.g. for SETPC rgb)
      if (T[p+1] && T[p+1][0]==='CMD' && T[p+1][1]==='LIST') {
        const items=[]; let np2=p+2;
        while(np2<T.length && T[np2][0]!==')'){
          const [v,nnp]=getValue(T,np2,V); items.push(v); np2=nnp;
        }
        return [items, np2+1];
      }
      // General parenthesised expression: (expr)
      const [v,np2]=evalExpr(T,p+1,V);
      return [v, T[np2]&&T[np2][0]===')'? np2+1 : np2];
    }
    if (k==='CMD') {
      const cmd=t[1]; p++;
      const FN={
        SQRT:a=>Math.sqrt(Math.abs(a)),SIN:a=>Math.sin(a*Math.PI/180),
        COS:a=>Math.cos(a*Math.PI/180),TAN:a=>Math.tan(a*Math.PI/180),
        INT:a=>Math.trunc(a),ROUND:a=>Math.round(a),ABS:a=>Math.abs(a),
        RANDOM:a=>Math.floor(Math.random()*Math.max(1,Math.abs(a))),
        LOG:a=>a>0?Math.log(a):0,EXP:a=>Math.exp(a),
        NOT:a=>(!a||a===0)?1:0,
      };
      const AR={SQRT:1,SIN:1,COS:1,TAN:1,INT:1,ROUND:1,ABS:1,RANDOM:1,LOG:1,EXP:1,NOT:1};
      if (FN[cmd]) {
        const args=[]; let np=p;
        for (let j=0;j<(AR[cmd]||1);j++){const[v,nnp]=getValue(T,np,V);args.push(v);np=nnp;}
        return [FN[cmd](...args),np];
      }
      if (cmd==='REMAINDER'||cmd==='MOD'||cmd==='MODULO') {
        const[a,np1]=getValue(T,p,V);const[b,np2]=getValue(T,np1,V);
        return [b!==0?a%b:0,np2];
      }
      if (cmd==='MAX') { const[a,np1]=getValue(T,p,V);const[b,np2]=getValue(T,np1,V);return[Math.max(a,b),np2]; }
      if (cmd==='MIN') { const[a,np1]=getValue(T,p,V);const[b,np2]=getValue(T,np1,V);return[Math.min(a,b),np2]; }
      if (cmd==='AND') { const[a,np1]=getValue(T,p,V);const[b,np2]=getValue(T,np1,V);return[(a&&a!==0&&b&&b!==0)?1:0,np2]; }
      if (cmd==='OR')  { const[a,np1]=getValue(T,p,V);const[b,np2]=getValue(T,np1,V);return[(a&&a!==0)||(b&&b!==0)?1:0,np2]; }
      if (cmd==='HEADING') return [heading,p];
      if (cmd==='XCOR')    return [sx-W/2,p];
      if (cmd==='YCOR')    return [H/2-sy,p];
      if (cmd==='PENDOWNP'||cmd==='PENDOWN?') return [penDown?1:0,p];
      if (cmd==='REPCOUNT') return [V.REPCOUNT??0,p];
      if (procs[cmd]) {
        const proc=procs[cmd]; const lv={...V}; let np=p;
        for (const param of proc.params){const[pv,nnp]=evalExpr(T,np,lv);lv[param]=pv;np=nnp;}
        if (callDepth<MAX_DEPTH){callDepth++;const res=run_(proc.body,lv);callDepth--;return[res!==undefined&&res!=='STOP'?res:0,np];}
        return [0,np];
      }
      if (cmd === 'LIST') {
        const items = [];
        let np = p;
        while (np < T.length) {
          const tok = T[np];
          if (tok[0] === ')' || tok[0] === ']') break;
          if (tok[0] === 'CMD' && !FN[tok[1]] && !procs[tok[1]] &&
              tok[1] !== 'REPCOUNT' && !NAMED_COLORS[tok[1]] && tok[1] !== 'LIST') break;
          const [v, nnp] = evalExpr(T, np, V);
          if (nnp === np) break;
          items.push(typeof v === 'number' ? Math.round(v) : v);
          np = nnp;
        }
        return [items, np];
      }
      if (NAMED_COLORS[cmd]) return [cmd, p]; // bare named color
      if (cmd in V) return [V[cmd], p]; // bare variable name without colon
      return [0,p];
    }
    return [0,p+1];
  }

  function evalExpr(T,p,V) {
    let [val,np]=getValue(T,p,V);
    const OPS=['+','-','*','/','=','<','>','<=','>='];
    while (np<T.length&&OPS.includes(T[np][0])) {
      const op=T[np][0]; np++;
      const [rv,rnp]=getValue(T,np,V); np=rnp;
      if(op==='+') val+=rv; else if(op==='-') val-=rv;
      else if(op==='*') val*=rv; else if(op==='/')val=rv?val/rv:0;
      else if(op==='=')val=val===rv?1:0; else if(op==='<')val=val<rv?1:0;
      else if(op==='>')val=val>rv?1:0; else if(op==='<=')val=val<=rv?1:0;
      else if(op==='>=')val=val>=rv?1:0;
    }
    return [val,np];
  }

  function run_(T,V) {
    let p=0;
    while (p<T.length) {
      if (opCount++>MAX_OPS) return;
      const t=T[p];
      if(!t||t[0]!=='CMD'){p++;continue;}
      const cmd=t[1]; p++;

      if(cmd==='FORWARD'||cmd==='FD'){
        const[d,np]=evalExpr(T,p,V);p=np;
        const r=toRad(heading);drawTo(sx+d*Math.cos(r),sy+d*Math.sin(r));
      } else if(cmd==='BACK'||cmd==='BK'){
        const[d,np]=evalExpr(T,p,V);p=np;
        const r=toRad(heading);drawTo(sx-d*Math.cos(r),sy-d*Math.sin(r));
      } else if(cmd==='RIGHT'||cmd==='RT'){
        const[a,np]=evalExpr(T,p,V);p=np;heading=(heading+a)%360;
      } else if(cmd==='LEFT'||cmd==='LT'){
        const[a,np]=evalExpr(T,p,V);p=np;heading=((heading-a)%360+360)%360;
      } else if(cmd==='SETHEADING'||cmd==='SETH'){
        const[a,np]=evalExpr(T,p,V);p=np;heading=((a%360)+360)%360;
      } else if(cmd==='SETXY'){
        const[xv,np1]=evalExpr(T,p,V);const[yv,np2]=evalExpr(T,np1,V);p=np2;
        drawTo(W/2+xv,H/2-yv);
      } else if(cmd==='SETX'){
        const[xv,np]=evalExpr(T,p,V);p=np;drawTo(W/2+xv,sy);
      } else if(cmd==='SETY'){
        const[yv,np]=evalExpr(T,p,V);p=np;drawTo(sx,H/2-yv);
      } else if(cmd==='PENUP'||cmd==='PU'||cmd==='UP'){
        penDown=false;
      } else if(cmd==='PENDOWN'||cmd==='PD'||cmd==='DOWN'){
        penDown=true;
      } else if(cmd==='HOME'){
        sx=W/2;sy=H/2;heading=0;
      } else if(cmd==='CLEARSCREEN'||cmd==='CS'){
        sx=W/2;sy=H/2;heading=0;
        queue.push({type:'bg',color:'#fff'});
      } else if(cmd==='CLEAN'){
        queue.push({type:'bg',color:'#fff'});
      } else if(cmd==='SETPENCOLOR'||cmd==='SETPC'||cmd==='PC'){
        if(T[p]&&T[p][0]==='['){
          const[list,np]=collectList(T,p);p=np;
          const r2=list[0]?list[0][1]:0,g=list[1]?list[1][1]:0,b=list[2]?list[2][1]:0;
          penColor=`rgb(${Math.round(r2)},${Math.round(g)},${Math.round(b)})`;
        } else {
          const[v,np]=evalExpr(T,p,V);p=np;
          penColor=Array.isArray(v)?'rgb('+(v[0]||0)+','+(v[1]||0)+','+(v[2]||0)+')':resolveColor(v);
        }
      } else if(cmd==='SETPENSIZE'||cmd==='SETWIDTH'||cmd==='PENSIZE'){
        const[s,np]=evalExpr(T,p,V);p=np;penSize=Math.max(0.3,s);
      } else if(cmd==='SETBACKGROUND'||cmd==='SETBG'||cmd==='BG'){
        let col;
        if(T[p]&&T[p][0]==='['){
          const[list,np]=collectList(T,p);p=np;
          const r2=list[0]?list[0][1]:0,g=list[1]?list[1][1]:0,b=list[2]?list[2][1]:0;

const _bytes=Uint8Array.from(atob(_b64),c=>c.charCodeAt(0));
const RAW=JSON.parse(new TextDecoder().decode(_bytes));
const H=RAW.history;const OC=RAW.origCode;
let MC='';
document.addEventListener('click',function(ev){const cv=ev.target.closest('canvas[data-code]');if(!cv)return;MC=decodeURIComponent(cv.getAttribute('data-code'));document.getElementById('mtitle').textContent=cv.getAttribute('data-title')||'Canvas';document.getElementById('mcode').textContent=MC;document.getElementById('modal').classList.add('show');playM();});
function openM(code,title){MC=code;document.getElementById('mtitle').textContent=title;document.getElementById('mcode').textContent=code;document.getElementById('modal').classList.add('show');playM();}
function playM(forceMax){const ms=document.getElementById('ms');if(forceMax){ms.value=100;document.getElementById('msl').textContent='10';drawCode('mc',MC,()=>0);return;}const v=parseInt(ms.value);drawCode('mc',MC,()=>Math.max(1,Math.ceil(v/10)));}
document.getElementById('ms').oninput=e=>{const v=parseInt(e.target.value);document.getElementById('msl').textContent=String(Math.max(1,Math.ceil(v/10)));};
function render(){
  const root=document.getElementById('root');
  let html='<div class="card"><div class="card-hd">Original Program</div><div class="grid2">';
  html+='<div><span class="lbl">Canvas</span><canvas data-code="'+encodeURIComponent(OC)+'" data-lazy="'+encodeURIComponent(OC)+'" data-title="Original" width="200" height="200" style="cursor:pointer;width:100%;display:block;background:#fff"></canvas></div>';
  html+='<div><span class="lbl">Code</span><div class="code">'+escHtml(OC)+'</div></div></div></div>';
  H.forEach((e,i)=>{
    html+='<div class="card"><div class="card-hd">'+escHtml(e.stage)+'</div>';
    html+='<div class="params">Magnitude: '+e.mag+'/10 · Taste: "'+escHtml(e.taste)+'"</div>';
    if(e.selLog)html+='<div class="sel-log">'+escHtml(e.selLog)+'</div>';
    if(e.variants&&e.variants.length){
      html+='<div class="lbl">Variants</div><div class="vgrid">';
      e.variants.forEach(v=>{
        if(v.title==='Parent')return; // shown as 'Original Program' above
        html+='<div class="vcard'+(v.isWinner?' win':'')+'"><div style="font-size:.65rem;font-weight:700;display:flex;justify-content:space-between;margin-bottom:4px"><span>'+escHtml(v.title)+'</span>'+(v.isWinner?'<span class="wb">✓</span>':'')+'</div>';
        html+='<canvas data-code="'+encodeURIComponent(v.code)+'" data-lazy="'+encodeURIComponent(v.code)+'" data-title="'+escHtml(v.title||'')+'" width="130" height="130" style="cursor:pointer;width:100%;display:block;background:#fff"></canvas>';
        html+='<div class="score">Aesthetics: '+(v.aes||0).toFixed(1)+' &middot; Novelty: '+(v.nov||0).toFixed(1)+' &middot; Total: '+(v.score||0).toFixed(1)+'</div>';
        if(v.reason&&v.reason!=='(not scored by critic)')html+='<div class="critic" style="font-size:.62rem;margin-top:4px">'+escHtml(v.reason)+'</div>';
        html+='</div>';
      });
      html+='</div>';
    }
    html+='<div class="code" style="margin-top:8px">'+escHtml(e.code||'')+'</div>';
    if(e.feedback)html+='<div class="critic"><strong>Critic:</strong> '+escHtml(e.feedback)+'</div>';
    html+='</div>';
  });
  // Winner lineage
  if(RAW.winnersList&&RAW.winnersList.length>=1){
    html+='<div class="card"><div class="card-hd" style="color:#7c3aed">Winner Lineage</div>';
    html+='<div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:8px">';
    const wl=RAW.winnersList;
    wl.forEach(function(wcode,wi){
      var lbl=wi===0?'Original':('Iter '+wi);
      var enc=encodeURIComponent(wcode);
      html+='<div style="flex-shrink:0;text-align:center">';
      html+='<div style="font-size:.6rem;color:#94a3b8;margin-bottom:4px">'+lbl+'</div>';
      html+='<canvas data-lazy="'+enc+'" data-code="'+enc+'" data-title="'+lbl+'" width="140" height="140" style="cursor:pointer;display:block;background:#fff;border:1px solid #e2e8f0;border-radius:4px"></canvas>';
      html+='</div>';
    });
    html+='</div></div>';
  }
  root.innerHTML=html;
  observeLazy();
}
function lazyCanvas(code, w, h) {
  var enc = encodeURIComponent(code);
  return '<canvas data-lazy="'+enc+'" data-code="'+enc+'" width="'+w+'" height="'+h+'" style="display:block;width:100%;background:#fff;border-radius:3px"></canvas>';
}
document.addEventListener('click', function(ev) {
  var nd = ev.target.closest('.tree-node[data-enc]');
  if (!nd) return;
  MC = decodeURIComponent(nd.getAttribute('data-enc'));
  var title = nd.getAttribute('data-label') || 'Canvas';
  document.getElementById('mtitle').textContent = title;
  document.getElementById('mcode').textContent = MC;
  document.getElementById('modal').classList.add('show');
  playM();
});
function buildTree() {
  var nodesMap = {};
  var root = {code:OC, title:'Original', score:null, isWinner:true, children:[]};
  nodesMap[OC] = root;
  H.forEach(function(e, i) {
    var parent = nodesMap[e.baseCode] || root;
    var variants = (e.variants && e.variants.length) ? e.variants : [{code:e.code, score:e.score, title:'Iter '+(i+1), isWinner:true}];
    var nonParentIdx = 0;
    variants.forEach(function(v, vi) {
      if (!v.code) return;
      if (v.code === parent.code) return; // skip duplicate of parent node
      nonParentIdx++;
      var lbl = v.isWinner ? ('Iter '+(i+1)+' ✓') : ('Iter '+(i+1)+' V'+nonParentIdx);
      var node = {code:v.code, title:lbl, score:v.score, isWinner:v.isWinner, children:[]};
      parent.children.push(node);
      if (!nodesMap[v.code]) nodesMap[v.code] = node;
    });
  });
  function renderNode(n) {
    var enc = encodeURIComponent(n.code);
    var cls = 'tree-node' + (n.isWinner ? ' winner-node' : '');
    var scoreHtml = (n.score != null) ? '<div class="node-score">'+parseFloat(n.score).toFixed(1)+'</div>' : '';
    var childrenHtml = n.children.length ? '<ul>'+n.children.map(renderNode).join('')+'</ul>' : '';
    return '<li>'
      + '<div class="'+cls+'" data-enc="'+enc+'" data-label="'+n.title+'">'
      + lazyCanvas(n.code, 110, 82)
      + '<div class="node-title">'+n.title+'</div>'
      + scoreHtml
      + '</div>'
      + childrenHtml
      + '</li>';
  }
  document.getElementById('treeRoot').innerHTML = renderNode(root);
  observeLazy();
  setTimeout(function(){
    var wrap=document.getElementById('treeWrap');
    var tree=document.getElementById('cssTree');
    if(wrap&&tree)wrap.scrollLeft=Math.max(0,(tree.scrollWidth-wrap.clientWidth)/2);
  },80);
}
function fitTree(){
  var tree=document.getElementById('cssTree');
  var wrap=document.getElementById('treeWrap');
  if(!tree||!wrap)return;
  var scale=Math.min(1,Math.max(0.2,(wrap.clientWidth-20)/tree.scrollWidth));
  tree.style.transformOrigin='top left';
  tree.style.transform='scale('+scale+')';
  wrap.style.height=(tree.scrollHeight*scale+20)+'px';
  wrap.style.overflow='hidden';
  document.getElementById('btnFit').textContent='Fitting…';
}
function actualSize(){
  var tree=document.getElementById('cssTree');
  var wrap=document.getElementById('treeWrap');
  if(!tree||!wrap)return;
  tree.style.transform='';
  wrap.style.height='';
  wrap.style.overflow='';
  document.getElementById('btnFit').textContent='Fit to screen';
}
(function(){
  var el,down=false,sx,sy,sl,st;
  function init(){el=document.getElementById('treeWrap');if(!el)return;
    el.style.cursor='grab';
    el.addEventListener('mousedown',function(e){down=true;sx=e.pageX;sy=e.pageY;sl=el.scrollLeft;st=el.scrollTop;el.style.cursor='grabbing';});
    window.addEventListener('mouseup',function(){down=false;if(el)el.style.cursor='grab';});
    el.addEventListener('mousemove',function(e){if(!down)return;e.preventDefault();el.scrollLeft=sl-(e.pageX-sx);el.scrollTop=st-(e.pageY-sy);});}
  document.addEventListener('DOMContentLoaded',init);
})();
window.onload=()=>{buildTree();render();};
</script>
